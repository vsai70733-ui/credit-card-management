<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Credit Card Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Outfit';
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--accent-primary);
        }
        .settings-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <ion-icon name="wallet"></ion-icon>
                <span>NexusPay</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><ion-icon name="grid-outline"></ion-icon> Dashboard</a>
                <a href="cards.html" class="nav-item"><ion-icon name="card-outline"></ion-icon> My Cards</a>
                <a href="transactions.html" class="nav-item"><ion-icon name="swap-horizontal-outline"></ion-icon> Transactions</a>
                <a href="analytics.html" class="nav-item"><ion-icon name="stats-chart-outline"></ion-icon> Analytics</a>
                <a href="settings.html" class="nav-item active"><ion-icon name="settings-outline"></ion-icon> Settings</a>
            </nav>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?img=68" alt="User Avatar" class="avatar">
                <div class="user-info">
                    <span class="user-name">Alex Morgan</span>
                    <span class="user-role">Premium Member</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="topbar">
                <div class="search-bar">
                    <ion-icon name="search-outline"></ion-icon>
                    <input type="text" placeholder="Search settings...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn"><ion-icon name="notifications-outline"></ion-icon><span class="badge">3</span></button>
                    <button class="mobile-menu-btn"><ion-icon name="menu-outline"></ion-icon></button>
                </div>
            </header>

            <div>
                <h2>Account Settings</h2>
                <div class="settings-grid">
                    <div class="settings-panel">
                        <h3 style="margin-bottom: 24px;">Personal Information</h3>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" value="Alex Morgan">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="text" value="alex.morgan@example.com">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" value="+1 (555) 123-4567">
                        </div>
                        <button class="primary-btn" style="margin-top: 10px;">Save Changes</button>
                    </div>

                    <div class="settings-panel">
                        <h3 style="margin-bottom: 24px;">Security</h3>
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" value="********">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" placeholder="Enter new password">
                        </div>
                        <button class="primary-btn" style="background: var(--text-secondary); color: #000; margin-top: 10px;">Update Password</button>
                        
                        <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--panel-border);">
                            <h4 style="margin-bottom: 12px; color: var(--danger);">Danger Zone</h4>
                            <button class="primary-btn" style="background: transparent; border: 1px solid var(--danger); color: var(--danger);">Deactivate Account</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
